version = 1

test_patterns = ["tests.py"]

exclude_patterns = [
  "__pycache__/",
  "static/",
  "Screenshots/",
  "recordings/",
  ".venv/",
  "venv/",
  "*.log",
  "*.pkl",
  "*.faiss",
  "*.pt",
  "*.onnx",
  "*.pb"
]

# Enable the Python analyzer (required for linting)
[[analyzers]]
name = "python"
enabled = true

[analyzers.meta]
# DeepSource only accepts "3.x.x" or "2.x.x" as runtime version patterns
runtime_version = "3.x.x"
max_line_length = 100

# Enable secret detection (optional but recommended)
[[analyzers]]
name = "secrets"
enabled = true

# Use Black to auto-format code on pull requests
[[code_formatters]]
name = "black"
enabled = true
